{% extends 'base.html' %}

{% block title %}Book Cargo - CargoFlow{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <div class="card-header">
        <h2 style="text-align: center;">Book New Shipment</h2>
    </div>
    <div class="card-body">
        <form method="POST" autocomplete="off">
            <div class="form-group">
                <label>Sender Name</label>
                <input name="sender" required placeholder="Enter sender name">
            </div>
            <div class="form-group">
                <label>Sender Email</label>
                <input name="sender_email" type="email" placeholder="Enter email address">
            </div>
            <div class="form-group">
                <label>Sender Phone</label>
                <input name="sender_phone" placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label>Receiver Name</label>
                <input name="receiver" required placeholder="Enter receiver name">
            </div>
            <div class="form-group">
                <label>Pickup Location</label>
                <select name="origin" id="origin" required>
                    <option value="" disabled selected>Select Pickup Location</option>
                    <option value="Kollam">Kollam</option>
                    <option value="Trivandrum">Trivandrum</option>
                    <option value="Kochi">Kochi</option>
                    <option value="Alappuzha">Alappuzha</option>
                    <option value="Kottayam">Kottayam</option>
                </select>
            </div>
            <div class="form-group">
                <label>Drop-off Location</label>
                <select name="destination" id="destination" required>
                    <option value="" disabled selected>Select Drop-off Location</option>
                    <option value="Kollam">Kollam</option>
                    <option value="Trivandrum">Trivandrum</option>
                    <option value="Kochi">Kochi</option>
                    <option value="Alappuzha">Alappuzha</option>
                    <option value="Kottayam">Kottayam</option>
                </select>
            </div>
            <div class="form-group">
                <label>Weight (kg)</label>
                <input name="weight" id="weight" type="number" step="0.1" required placeholder="Enter weight in kg">
            </div>
            
            <div class="form-group" style="padding: 15px; background: rgba(99, 102, 241, 0.1); border-radius: 8px; margin-bottom: 20px;">
                <h4 style="margin: 0; color: #6366f1;">Estimated Total Cost: <span id="total-cost">₹0.00</span></h4>
                <small style="color: #64748b; display: block; margin-top: 5px;" id="calculation-details">Weight × 10.5 + Distance × 5</small>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Confirm Booking</button>
        </form>
    </div>
</div>

<script>
    const originSelect = document.getElementById('origin');
    const destinationSelect = document.getElementById('destination');
    const weightInput = document.getElementById('weight');
    const costDisplay = document.getElementById('total-cost');
    const detailsDisplay = document.getElementById('calculation-details');

    function calculateCost() {
        const origin = originSelect.value;
        const destination = destinationSelect.value;
        const weight = parseFloat(weightInput.value) || 0;
        const submitBtn = document.querySelector('button[type="submit"]');

        if (origin && destination && origin === destination) {
            costDisplay.textContent = 'Error';
            detailsDisplay.textContent = 'Pickup and Drop-off cannot be the same.';
            detailsDisplay.style.color = '#dc3545';
            submitBtn.disabled = true;
            return;
        } else {
            detailsDisplay.style.color = '#64748b';
            submitBtn.disabled = false;
        }

        if (origin && destination) {
            fetch(`/api/get_distance?origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}`)
                .then(response => response.json())
                .then(data => {
                    const distance = data.distance;
                    const cost = (weight * 10.5) + (distance * 5);
                    costDisplay.textContent = '₹' + cost.toFixed(2);
                    detailsDisplay.textContent = `(${weight} kg × ₹10.5) + (${distance} km × ₹5)`;
                })
                .catch(err => console.error("Error fetching distance:", err));
        } else {
            const cost = weight * 10.5;
            costDisplay.textContent = '₹' + cost.toFixed(2);
            detailsDisplay.textContent = `(${weight} kg × ₹10.5) + (0 km × ₹5)`;
        }
    }

    originSelect.addEventListener('change', calculateCost);
    destinationSelect.addEventListener('change', calculateCost);
    weightInput.addEventListener('input', calculateCost);
</script>
{% endblock %}
