{% extends "base.html" %}

{% block title %}Login - CargoFlow{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Login to your account to continue</p>

        {% if False %}
        {# Flash messages are handled in base.html now #}
        {% endif %}

        <form method="POST" action="/login" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Login Now</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="/register">Create one</a></p>
        </div>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
    }

    .auth-card {
        background: var(--bg-card);
        padding: 2.5rem;
        border-radius: var(--radius);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        text-align: center;
        border: 1px solid var(--border);
    }

    .auth-subtitle {
        color: var(--text-muted);
        margin-bottom: 2rem;
    }

    .form-group {
        text-align: left;
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-muted);
    }

    .form-group input {
        width: 100%;
        padding: 0.75rem;
        background: var(--bg-dark);
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        color: var(--text-main);
        font-size: 1rem;
        transition: var(--transition);
    }

    .form-group input:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .btn-block {
        width: 100%;
        margin-top: 1rem;
    }

    .auth-footer {
        margin-top: 2rem;
        font-size: 0.9rem;
        color: #666;
    }

    .auth-footer a {
        color: #007bff;
        text-decoration: none;
        font-weight: 600;
    }

    .alert {
        padding: 0.75rem;
        margin-bottom: 1rem;
        border-radius: 0.5rem;
        font-size: 0.9rem;
    }

    .alert-error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
    }

    .alert-success {
        background: #dcfce7;
        color: #166534;
        border: 1px solid #bbf7d0;
    }
</style>
{% endblock %}
